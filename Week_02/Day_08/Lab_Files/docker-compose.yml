# ─────────────────────────────────────────────────────────────────────────────
# Day 8 – Workflow Orchestration with Airflow
# Full Stack: Airflow + Kafka + Apache Hop + PostgreSQL
# ─────────────────────────────────────────────────────────────────────────────
#
# Services:
#   postgres       – Airflow metadata DB + data warehouse (ports 5432)
#   kafka          – Event streaming (KRaft mode, ports 9092/29092)
#   kafka-ui       – Kafka monitoring UI (port 8081)
#   airflow-init   – One-shot DB migration + user/connection creation
#   airflow-web    – Airflow webserver UI (port 8080)
#   airflow-sched  – Airflow scheduler + triggerer
#   hop-web        – Apache Hop visual designer (port 8082)
#   hop-cli        – Apache Hop CLI for Airflow-triggered runs (profile: cli)
#
# Usage:
#   docker compose up -d                       # start core stack
#   docker compose --profile cli up -d         # include Hop CLI
#   docker compose down -v                     # tear down everything
# ─────────────────────────────────────────────────────────────────────────────

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  environment: &airflow-env
    # ── Core ───────────────────────────────────────────────
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'False'
    AIRFLOW__CORE__TEST_CONNECTION: Enabled
    # ── Webserver ──────────────────────────────────────────
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'True'
    AIRFLOW__WEBSERVER__WARN_DEPLOYMENT_EXPOSURE: 'False'
    # ── Scheduler ──────────────────────────────────────────
    AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: 10
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: 5
    # ── Custom variables for DAGs ──────────────────────────
    WAREHOUSE_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    KAFKA_BROKER: kafka:29092
    KAFKA_ORDERS_TOPIC: orders.raw
    KAFKA_PROCESSED_TOPIC: orders.processed
    HOP_PROJECT_FOLDER: /hop-project
    HOP_PROJECT_NAME: day8_airflow_hop
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./data:/opt/airflow/data
    - ./hop:/hop-project
    - ./scripts:/opt/airflow/scripts
    - ./include:/opt/airflow/include
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - day8-airflow

services:
  # ────────────────────────────────────────────────────────────
  # PostgreSQL – Airflow metadata + data warehouse
  # ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: day8-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init_warehouse.sql:/docker-entrypoint-initdb.d/01_init_warehouse.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - day8-airflow

  # ────────────────────────────────────────────────────────────
  # Apache Kafka (KRaft – no Zookeeper)
  # ────────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    container_name: day8-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - day8-airflow

  # ────────────────────────────────────────────────────────────
  # Kafka UI – monitoring dashboard
  # ────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: day8-kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: day8-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - day8-airflow

  # ────────────────────────────────────────────────────────────
  # Airflow – Initialization (one-shot)
  # ────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: day8-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        # Create admin user
        airflow users create \
          --username admin \
          --password admin \
          --firstname Lab \
          --lastname Admin \
          --role Admin \
          --email admin@lab.local || true
        # Filesystem connection for FileSensor
        airflow connections add fs_default \
          --conn-type fs \
          --conn-extra '{"path": "/"}' || true
        # PostgreSQL warehouse connection (separate from metadata)
        airflow connections add warehouse_postgres \
          --conn-type postgres \
          --conn-host postgres \
          --conn-schema airflow \
          --conn-login airflow \
          --conn-password airflow \
          --conn-port 5432 || true
        # HTTP connection for HttpSensor demo
        airflow connections add http_default \
          --conn-type http \
          --conn-host httpbin.org \
          --conn-schema https \
          --conn-port 443 || true
        # Airflow Variables for DAGs
        airflow variables set kafka_broker "kafka:29092" || true
        airflow variables set kafka_orders_topic "orders.raw" || true
        airflow variables set hop_project_folder "/hop-project" || true
        airflow variables set data_quality_threshold "0.95" || true

  # ────────────────────────────────────────────────────────────
  # Airflow – Webserver (UI on port 8080)
  # ────────────────────────────────────────────────────────────
  airflow-web:
    <<: *airflow-common
    container_name: day8-airflow-web
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s

  # ────────────────────────────────────────────────────────────
  # Airflow – Scheduler (+ triggerer for deferrable operators)
  # ────────────────────────────────────────────────────────────
  airflow-sched:
    <<: *airflow-common
    container_name: day8-airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    command: bash -c "airflow scheduler & airflow triggerer & wait"

  # ────────────────────────────────────────────────────────────
  # Apache Hop – Web UI (visual pipeline designer)
  # ────────────────────────────────────────────────────────────
  hop-web:
    image: apache/hop-web:latest
    container_name: day8-hop-web
    user: "0:0"
    ports:
      - "8082:8080"
    environment:
      HOP_LOG_LEVEL: Basic
      HOP_PROJECT_NAME: day8_airflow_hop
      HOP_PROJECT_FOLDER: /project
    command:
      - /bin/bash
      - -lc
      - |
        /tmp/run-web.sh &
        web_pid="$$!"
        (
          while kill -0 "$${web_pid}" 2>/dev/null; do
            if "$${DEPLOYMENT_PATH}/hop-conf.sh" -pl 2>/dev/null | grep -q "^  $${HOP_PROJECT_NAME} :"; then
              "$${DEPLOYMENT_PATH}/hop-conf.sh" --default-project="$${HOP_PROJECT_NAME}" >/tmp/day8-default-project.log 2>&1 || true
            fi
            sleep 5
          done
        ) &
        wait "$${web_pid}"
    volumes:
      - ./hop:/project:rw
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - day8-airflow

  # ────────────────────────────────────────────────────────────
  # Apache Hop – CLI (for Airflow-triggered pipeline execution)
  # ────────────────────────────────────────────────────────────
  hop-cli:
    image: apache/hop:latest
    container_name: day8-hop-cli
    user: "0:0"
    profiles:
      - cli
    working_dir: /project
    environment:
      HOP_LOG_LEVEL: Basic
      HOP_PROJECT_NAME: day8_airflow_hop
      HOP_PROJECT_FOLDER: /project
    volumes:
      - ./hop:/project:rw
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - day8-airflow
    command: ["tail", "-f", "/dev/null"]

volumes:
  postgres_data:

networks:
  day8-airflow:
    driver: bridge
